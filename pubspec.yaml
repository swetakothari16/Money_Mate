name: money_mate
description: A modern expense tracker app built with Flutter, Riverpod, GoRouter, and Isar.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # UI & Utilities
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  shared_preferences: ^2.2.3

  # Firebase Sync
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2
  firebase_auth: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: 2.4.13
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
